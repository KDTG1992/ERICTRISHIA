    function searchGuest() {
        const input = document.getElementById('guestSearch').value.toLowerCase().trim();
        const resultDiv = document.getElementById('result');
        
        if (input === "") {
            resultDiv.innerHTML = "";
            return;
        }

        // We filter the list to find any matches in Surname OR Given Name
        const found = guests.find(g => {
            const firstName = (g["Given Name "] || "").toLowerCase();
            const lastName = (g["Surname "] || "").toLowerCase();
            const fullName = firstName + " " + lastName;
            
            return firstName.includes(input) || lastName.includes(input) || fullName.includes(input);
        });

        if (found) {
            resultDiv.innerHTML = `
                <div>Welcome, <br><span class="highlight">${found["Given Name "]} ${found["Surname "]}</span></div>
                <div style="margin-top:15px;">Your assigned table is:</div>
                <div class="highlight">${found["Table #"]}</div>
            `;

            resultDiv.innerHTML = "<span style='color:red;'>Name not found. Please check the spelling.</span>";
